<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="桃園市保全人員職業工會 - 發起人招募表單">
    <title>成為發起人 - 桃園市保全人員職業工會</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Form Page Specific Styles */
        .form-hero {
            background: linear-gradient(135deg, #003366 0%, #004080 100%);
            padding: 120px 0 80px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .form-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/></pattern></defs><rect width="100%" height="100%" fill="url(%23grid)"/></svg>');
            opacity: 0.3;
        }

        .form-hero-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .form-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .form-subtitle {
            font-size: 1.2rem;
            font-weight: 300;
            margin-bottom: 2rem;
            color: #FFD700;
        }

        .form-section {
            background: #f8f9fa;
            padding: 60px 0;
            min-height: 60vh;
        }

        .form-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 51, 102, 0.1);
            border: 1px solid rgba(0, 51, 102, 0.1);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #003366;
            font-size: 1rem;
        }

        .form-label .required {
            color: #ff4444;
            margin-left: 4px;
        }

        .form-label .optional {
            color: #888;
            font-size: 0.85rem;
            margin-left: 8px;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Noto Sans TC', sans-serif;
            transition: all 0.3s ease;
            background: white;
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: #003366;
            box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1);
        }

        .form-input.error,
        .form-select.error {
            border-color: #ff4444;
            box-shadow: 0 0 0 3px rgba(255, 68, 68, 0.1);
        }

        .error-message {
            color: #ff4444;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }

        .form-submit {
            width: 100%;
            padding: 15px 30px;
            background: linear-gradient(135deg, #FFD700 0%, #FFC700 100%);
            color: #003366;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .form-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
            background: linear-gradient(135deg, #FFC700 0%, #FFB700 100%);
        }

        .form-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .form-submit.loading {
            background: linear-gradient(135deg, #ccc 0%, #999 100%);
            color: #666;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .form-submit.loading .loading-spinner {
            display: inline-block;
        }

        .form-submit.loading .submit-text {
            opacity: 0.7;
        }

        .success-message {
            display: none;
            background: #4CAF50;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }

        .error-alert {
            display: none;
            background: #f44336;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .form-hero {
                padding: 100px 0 60px;
            }

            .form-title {
                font-size: 2rem;
            }

            .form-subtitle {
                font-size: 1rem;
            }

            .form-container {
                margin: 0 20px;
                padding: 30px 20px;
            }

            .form-section {
                padding: 40px 0;
            }
        }

        @media (max-width: 480px) {
            .form-title {
                font-size: 1.8rem;
            }

            .form-container {
                padding: 25px 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="nav">
            <div class="nav-container">
                <div class="nav-logo">
                    <img src="images/logo.png" alt="桃園市保全人員職業工會" class="logo-img">
                    <div class="logo-wrapper">
                        <div class="logo-text">桃園市保全職業工會</div>
                        <div class="logo-text2">Taoyuan Security Union</div>
                    </div>
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">首頁</a></li>
                    <li><a href="index.html#about" class="nav-link">關於我們</a></li>
                    <li><a href="index.html#benefits" class="nav-link">會員福利</a></li>
                    <li><a href="index.html#contact" class="nav-link">聯絡我們</a></li>
                </ul>
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </nav>
    </header>

    <!-- Form Hero Section -->
    <section class="form-hero">
        <div class="form-hero-content">
            <h1 class="form-title">成為創會發起人</h1>
            <p class="form-subtitle">加入我們，成為桃園保全業的創始英雄</p>
        </div>
    </section>

    <!-- Form Section -->
    <section class="form-section">
        <div class="container">
            <div class="form-container">
                <div class="success-message" id="successMessage">
                    🎉 感謝您的申請！我們會盡快與您聯繫。
                </div>
                
                <div class="error-alert" id="errorMessage">
                    ❌ 送出失敗，請檢查網路連線後重試。
                </div>

                <form id="founderForm">
                    <div class="form-group">
                        <label for="name" class="form-label">
                            姓名 <span class="required">*</span>
                        </label>
                        <input type="text" id="name" name="name" class="form-input" required placeholder="請輸入您的姓名">
                        <div class="error-message" id="nameError">請輸入姓名</div>
                    </div>

                    <div class="form-group">
                        <label for="phone" class="form-label">
                            聯絡電話 <span class="required">*</span>
                        </label>
                        <input type="tel" id="phone" name="phone" class="form-input" required placeholder="請輸入您的手機號碼">
                        <div class="error-message" id="phoneError">請輸入有效的電話號碼</div>
                    </div>

                    <div class="form-group">
                        <label for="lineId" class="form-label">
                            LINE ID <span class="optional">(選填)</span>
                        </label>
                        <input type="text" id="lineId" name="lineId" class="form-input" placeholder="請輸入您的 LINE ID">
                    </div>

                    <div class="form-group">
                        <label for="occupation" class="form-label">
                            目前的職業 <span class="required">*</span>
                        </label>
                        <select id="occupation" name="occupation" class="form-select" required>
                            <option value="">請選擇職業類別</option>
                            <option value="保全人員">保全人員</option>
                            <option value="物業管理">物業管理</option>
                            <option value="其他">其他</option>
                        </select>
                        <div class="error-message" id="occupationError">請選擇職業類別</div>
                    </div>

                    <button type="submit" class="form-submit" id="submitBtn">
                        <span class="loading-spinner"></span>
                        <span class="submit-text">送出申請</span>
                    </button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <h3>桃園市保全人員職業工會</h3>
                    <p>保障權益．提升技能．溫暖互助</p>
                </div>
                <div class="footer-links">
                    <h4>快速連結</h4>
                    <ul>
                        <li><a href="index.html">首頁</a></li>
                        <li><a href="index.html#about">關於我們</a></li>
                        <li><a href="index.html#benefits">會員福利</a></li>
                        <li><a href="index.html#contact">聯絡我們</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 桃園市保全人員職業工會 版權所有</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="founder-form.js"></script>
</body>
</html>
